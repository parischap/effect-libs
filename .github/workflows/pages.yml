# ************** This file is automatically generated. Any modifications will be lost ************************

name: Pages
on:
  workflow_dispatch:
permissions:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout mytsdevs workspace
        uses: actions/checkout@v6.0.2
        with:
          repository: parischap/mytsdevs
          token: ${{ secrets.MYTSDEVS_PAT }}
          submodules: recursive
      - name: Update package to triggering commit
        run: |
          git -C packages/effect-libs fetch origin
          git -C packages/effect-libs checkout ${{ github.sha }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.8.0
          run_install: true
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: latest
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - name: Build documentation
        working-directory: packages/effect-libs
        run: pnpm docgen-all && pnpm configs concat-docs
      - name: Build pages Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: packages/effect-libs/docs
          destination: _site
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4