# ************** This file is automatically generated. Any modifications will be lost ************************

name: Publish
on:
  release:
    types:
      - published
permissions:
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: true
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: latest
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - name: Check release tag matches package.json version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ "$TAG" != "0.1.0" ]; then
            echo "Release tag '$TAG' does not match package.json version '0.1.0'"
            exit 1
          fi
          
      - name: Format and build for Npm
        run: pnpm commands 9 0 2
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          if [ -d packages ]; then
            for pkg_dir in packages/*/; do
              if [ -d "${pkg_dir}dist" ]; then
                (cd "${pkg_dir}dist" && npm publish --provenance)
              fi
            done
          else
            (cd dist && npm publish --provenance)
          fi
          