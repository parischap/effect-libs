# ************** This file is automatically generated. Any modifications will be lost ************************

name: AddReleaseAssets
on:
  release:
    types:
      - published
permissions:
  contents: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  add-release-assets:
    name: Add release assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          run_install: true
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - name: Check release tag matches package.json version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ "$TAG" != "0.1.0" ]; then
            echo "Release tag '$TAG' does not match package.json version '0.1.0'"
            exit 1
          fi
          
      - name: Format and build for Github
        run: pnpm commands 10 0 2
      - name: Create and upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -d packages ]; then
            for pkg_dir in packages/*/; do
              pkg_name=$(basename "$pkg_dir")
              if [ -d "${pkg_dir}dist" ]; then
                zip -r "${pkg_name}-dist.zip" "${pkg_dir}dist"
                gh release upload "$TAG" "${pkg_name}-dist.zip"
              fi
            done
          else
            zip -r "dist.zip" dist
            gh release upload "$TAG" "dist.zip"
          fi
          