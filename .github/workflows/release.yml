# ************** This file is automatically generated. Any modifications will be lost ************************

name: Release
on:
  release:
    types:
      - published
permissions:
  id-token: write
  contents: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout mytsdevs workspace
        uses: actions/checkout@v6.0.2
        with:
          repository: parischap/mytsdevs
          token: ${{ secrets.MYTSDEVS_PAT }}
          submodules: recursive
      - name: Update package to triggering commit
        run: |
          git -C packages/effect-libs fetch origin
          git -C packages/effect-libs checkout ${{ github.sha }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.7.0
          run_install: true
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: latest
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - name: Check release tag matches package.json version
        run: |
          if [ "$TAG" != "0.1.0" ]; then
            echo "Release tag '$TAG' does not match package.json version '0.1.0'"
            exit 1
          fi
          
      - name: Build and publish
        working-directory: packages/effect-libs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: pnpm configs build all && pnpm zip-release-assets-all && pnpm send-release-attachments && pnpm publish-to-npm-all